apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: demo-konflux-test-2 
  description: Secure Supply Chain Example for Quarkus Java example with advanced continuous integration pipeline covering building, CVE scanning, security scanning, signatures, attestations, SLSA provenance and SBOM along with Gitops-based continuous deployment.   
  links:
    - url: https://www.redhat.com/en/solutions/trusted-software-supply-chain
      title: Trusted Secure Supply Chain 
      icon: dashboard
      type: admin-dashboard
    - url: "https://devspaces.apps.salamander.aimlworkbench.com/#https://github.com/deanpeterson/demo-konflux-test-2"
      title: "Open in Dev Spaces"
      icon: catalog
      type: devspaces
  annotations:
    # ArgoCD apps from this template used tssc-gitops as the grouping
    argocd/app-selector: tssc/gitops=demo-konflux-test-2
    backstage.io/kubernetes-id: demo-konflux-test-2 
    backstage.io/kubernetes-namespace: default-tenant
    backstage.io/kubernetes-label-selector: pipelinesascode.tekton.dev/repository=demo-konflux-test-2
    backstage.io/techdocs-ref: dir:. 
    janus-idp.io/tekton: demo-konflux-test-2
    quay.io/repository-slug: rhdh/demo-konflux-test-2
  tags: ["java", "quarkus", "sscs", "sbom", "acs"] 
spec:
  type: service
  owner: user:default/deanpeterson 
  lifecycle: experimental
